<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AVF OG image source — 1200×630</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Newsreader:ital,opsz,wght@0,6..72,400..800;1,6..72,400..600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #2a2a2a;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; padding: 40px;
    font-family: 'Inter', sans-serif;
  }

  /* This card IS the OG image. Screenshot or render this to PNG at 1200×630. */
  .og-card {
    width: 1200px; height: 630px;
    background: #FDFBF6;
    position: relative;
    overflow: hidden;
    /* Subtle gradient hint of cream depth */
    background-image:
      radial-gradient(circle at 90% 90%, #F6F1E6 0%, #FDFBF6 50%);
  }

  /* Decorative shapes (subtle, brand-aligned) */
  .deco-circle-1 {
    position: absolute; top: -80px; right: -80px;
    width: 280px; height: 280px;
    background: #E8F5F3;
    border-radius: 50%;
    opacity: 0.6;
  }
  .deco-circle-2 {
    position: absolute; bottom: -60px; left: -60px;
    width: 200px; height: 200px;
    background: #FAF1DC;
    border-radius: 50%;
    opacity: 0.5;
  }

  /* Brand mark top-left */
  .brand {
    position: absolute; top: 56px; left: 80px;
    display: flex; align-items: center; gap: 14px;
  }
  .brand-bar {
    width: 5px; height: 44px;
    background: #00B4D8;
    border-radius: 2px;
  }
  .brand-name {
    font-family: 'Inter', sans-serif;
    font-weight: 800;
    font-size: 18px;
    color: #0D1527;
    letter-spacing: 0.5px;
    line-height: 1.1;
  }
  .brand-name span { display: block; }

  /* Eyebrow above headline */
  .eyebrow {
    position: absolute; top: 220px; left: 80px;
    display: flex; align-items: center; gap: 14px;
  }
  .eyebrow-line {
    width: 32px; height: 1px;
    background: #00B4D8;
  }
  .eyebrow-label {
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #5A6273;
  }

  /* Big headline */
  .headline {
    position: absolute; top: 270px; left: 80px;
    font-family: 'Newsreader', Georgia, serif;
    font-variation-settings: "opsz" 60;
    font-size: 92px;
    font-weight: 700;
    color: #0D1527;
    line-height: 1.02;
    letter-spacing: -2px;
    max-width: 1040px;
  }
  .headline .accent {
    font-family: 'Newsreader', Georgia, serif;
    font-variation-settings: "opsz" 60;
    font-style: italic;
    font-weight: 500;
    color: #00B4D8;
  }

  /* Sub line — small italic serif */
  .subline {
    position: absolute; bottom: 90px; left: 80px;
    font-family: 'Newsreader', Georgia, serif;
    font-style: italic;
    font-size: 22px;
    color: #5A6273;
  }

  /* Tagline pill bottom-right */
  .tagline {
    position: absolute; bottom: 80px; right: 80px;
    display: flex; align-items: center; gap: 10px;
    padding: 12px 22px;
    background: #FFFFFF;
    border: 1px solid #EBE5D5;
    border-radius: 100px;
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: #0D1527;
  }
  .tagline-dot {
    width: 6px; height: 6px;
    background: #00B4D8;
    border-radius: 50%;
  }

  /* Helper banner above the card to remind how to use */
  .helper {
    position: fixed; top: 12px; left: 12px;
    background: rgba(0,0,0,0.6);
    color: #fff;
    padding: 8px 14px;
    border-radius: 6px;
    font-family: -apple-system, sans-serif;
    font-size: 12px;
    z-index: 100;
  }
</style>
</head>
<body>
  <div class="helper">Open in browser. Use DevTools device mode at exactly 1200×630, or screenshot with cmd+shift+4 dragged across the cream card area, save as <code>og-image.png</code> in <code>public/images/</code></div>

  <div class="og-card">
    <div class="deco-circle-1"></div>
    <div class="deco-circle-2"></div>

    <div class="brand">
      <div class="brand-bar"></div>
      <div class="brand-name">
        <span>AI VALUE</span>
        <span>FIRM</span>
      </div>
    </div>

    <div class="eyebrow">
      <span class="eyebrow-line"></span>
      <span class="eyebrow-label">AI Value Advisory</span>
    </div>

    <h1 class="headline">AI value is<br><span class="accent">measurable.</span></h1>

    <div class="subline">The value never reaches the P&amp;L.</div>

    <div class="tagline">
      <span class="tagline-dot"></span>
      <span>aivaluefirm.com</span>
    </div>
  </div>
</body>
</html>
